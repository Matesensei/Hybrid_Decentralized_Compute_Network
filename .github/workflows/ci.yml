name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features

  sim-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install simulator dependencies
        run: pip install -r sim/requirements.txt
      - name: Syntax check
        run: python -m py_compile sim/depin_network_model.py
      - name: Run deterministic simulator smoke
        env:
          MPLCONFIGDIR: /tmp/matplotlib
        run: python sim/depin_network_model.py --scenario base --runs 3 --days 30 --out out/ci-smoke
